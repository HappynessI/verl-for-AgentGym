# wyh_exp: Turn-based Prefix RL 配置
# 支持两种训练模式

# ============================================================================
# 数据配置
# ============================================================================
data:
  # 数据文件路径
  train_files: null  # 需要在启动脚本中指定
  val_files: null
  
  # 数据字段
  prompt_key: query
  messages_key: messages
  reward_key: reward
  turn_rewards_key: turn_rewards
  
  # 长度限制
  max_prompt_length: 1024
  max_response_length: 4096
  truncation: right  # left, right, error
  
  # Turn-Prefix 配置
  # mode: full_trajectory | prefix_guided
  mode: full_trajectory
  
  # Prefix 策略 (仅 prefix_guided 模式)
  prefix_strategy: random  # fixed, random, all
  fixed_prefix_turns: 2    # 固定策略时使用的 turn 数
  min_prefix_turns: 1      # 最小 prefix turn 数
  max_prefix_turns: null   # 最大 prefix turn 数，null 表示自动
  num_rollouts_per_prefix: 2  # 每个 prefix 生成的 rollout 数量
  
  # 其他
  shuffle: true
  train_batch_size: 64

# ============================================================================
# 模型配置
# ============================================================================
actor_rollout_ref:
  model:
    path: null  # 需要指定模型路径
    enable_gradient_checkpointing: true
    use_remove_padding: false
  
  actor:
    ppo_mini_batch_size: 16
    ppo_epochs: 1
    grad_clip: 1.0
    optim:
      lr: 1e-6
      lr_warmup_steps_ratio: 0.1
      weight_decay: 0.01
    
    # 损失配置
    clip_ratio: 0.2
    loss_agg_mode: token-mean
    entropy_coeff: 0.01
    
    # FSDP 配置
    fsdp_config:
      param_offload: false
      optimizer_offload: false
  
  rollout:
    name: vllm
    temperature: 0.7
    top_p: 0.95
    n: 4  # 每个 prompt 生成的 rollout 数量
    response_length: ${data.max_response_length}
    gpu_memory_utilization: 0.7
  
  ref:
    fsdp_config:
      param_offload: true

# ============================================================================
# 算法配置
# ============================================================================
algorithm:
  # 优势估计方法
  # adv_estimator: turn_full_trajectory | turn_prefix_guided | turn_prefix_guided_dr
  adv_estimator: turn_full_trajectory
  
  # GRPO 配置
  norm_adv_by_std_in_grpo: true  # true=GRPO, false=Dr.GRPO
  
  # KL 控制
  use_kl_in_reward: false
  kl_ctrl:
    type: fixed
    kl_coef: 0.001
  
  # Prefix 优势模式 (仅 prefix_guided 模式)
  prefix_advantage_mode: zero  # zero, sft, relative
  
  # Turn 加权
  turn_weighting: false

# ============================================================================
# 奖励配置
# ============================================================================
reward_model:
  enable: false
  reward_manager: naive

custom_reward_function:
  path: null  # 自定义奖励函数路径
  name: compute_score

# ============================================================================
# 训练配置
# ============================================================================
trainer:
  total_epochs: 3
  save_freq: 50
  test_freq: 50
  
  project_name: wyh_exp
  experiment_name: turn_prefix_rl
  logger: ['console', 'wandb']
  
  nnodes: 1
  n_gpus_per_node: 8
  
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
  val_before_train: true

# ============================================================================
# 环境交互配置 (AgentGym)
# ============================================================================
interaction:
  enable: true
  env_name: textcraft  # textcraft, webshop, alfworld, etc.
  env_server_base: http://localhost:8000
  max_rounds: 50
  timeout: 30
  
  # 从 prefix 续写
  continue_from_prefix: true

