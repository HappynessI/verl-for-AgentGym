# wyh_exp: Turn-based Prefix RL 训练配置
# 继承 verl 标准 ppo_trainer.yaml
# 训练参数与 textcraft_grpo_train.yaml 对齐，仅更换优势估计器
#
# 使用方式：
#   python3 -m recipe.wyh_exp.main_train \
#       --config-path=config --config-name=train_config \
#       algorithm.adv_estimator=turn_full_trajectory

hydra:
  searchpath:
    - file:///Data/wyh/verl/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# ============================================================================
# 数据配置
# train_files: prefix 数据（Gemini 轨迹作为 prefix，SLM 在线续写）
# val_files: 原始数据（无 prefix，用于评估 SLM 独立能力）
# ============================================================================
data:
  train_files: /Data/wyh/datasets/wyh_exp_prefix/prefix_train.parquet
  val_files: /Data/wyh/datasets/wyh_exp_prefix/baseline_train.parquet
  max_prompt_length: 4096
  max_response_length: 9216
  train_batch_size: 64
  val_batch_size: 4
  filter_overlong_prompts: True
  truncation: 'error'
  return_raw_chat: True

# ============================================================================
# 模型 & Rollout 配置（与 textcraft_grpo_train.yaml 一致）
# ============================================================================
actor_rollout_ref:
  hybrid_engine: True

  model:
    path: /Data/public/Qwen3-1.7B
    use_remove_padding: True
    enable_gradient_checkpointing: True
    enable_activation_offload: True

  actor:
    optim:
      lr: 1e-6
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 2
    ppo_max_token_len_per_gpu: 12288
    clip_ratio: 0.2
    use_kl_loss: True
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    fsdp_config:
      param_offload: True
      optimizer_offload: False
      model_dtype: bfloat16

  rollout:
    name: vllm
    temperature: 0.7
    top_p: 0.9
    top_k: -1
    prompt_length: 4096
    response_length: 4096
    gpu_memory_utilization: 0.6
    tensor_model_parallel_size: 1
    max_model_len: 10240
    max_num_batched_tokens: 10240
    max_num_seqs: 256
    enforce_eager: True
    free_cache_engine: True
    disable_log_stats: True
    n: 4
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_max_token_len_per_gpu: 12288

    val_kwargs:
      temperature: 0.3
      top_p: 0.9
      do_sample: true
      n: 1
      max_tokens: 512

    multi_turn:
      enable: True
      max_user_turns: 25
      max_assistant_turns: 25
      interaction_config_path: /Data/wyh/verl/examples/sglang_multiturn/config/interaction_config/textcraft_interaction.yaml

    agent:
      default_agent_loop: tool_agent
      num_workers: 2

  ref:
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_max_token_len_per_gpu: 6144
    fsdp_config:
      param_offload: False
      model_dtype: bfloat16

# ============================================================================
# 算法配置 — 唯一的区别：使用自定义优势估计器
# ============================================================================
algorithm:
  # 可选: turn_full_trajectory | turn_prefix_guided | turn_prefix_guided_dr | grpo
  adv_estimator: turn_full_trajectory
  norm_adv_by_std_in_grpo: True
  use_kl_in_reward: False

# ============================================================================
# 训练器配置（与 textcraft_grpo_train.yaml 一致）
# ============================================================================
trainer:
  n_gpus_per_node: 2
  nnodes: 1
  device: cuda
  critic_warmup: 0
  total_epochs: 10
  save_freq: 50
  test_freq: 5
  val_before_train: True
  logger: [console, wandb]
  project_name: wyh_exp
  experiment_name: turn_prefix_textcraft
  default_local_dir: /Data/wyh/datasets/Verl-Data/outputs/wyh_exp_textcraft

# Critic 不需要（GRPO 式方法）
critic:
  enable: False

# 不使用额外 Reward Model
reward_model:
  enable: False
