hydra:
  searchpath: []

defaults:
  - ppo_trainer
  - _self_

# Data configuration
data:
  train_files: null  # 通过命令行 --data.train_files 传入
  val_files: null  # 通过命令行 --data.val_files 传入
  max_prompt_length: 2048  # 第一轮任务描述的最大长度
  max_response_length: 4096  # 整个episode所有轮次累积的response token总长度上限
  train_batch_size: 16
  val_batch_size: 4
  filter_overlong_prompts: True
  truncation: 'error'
  return_raw_chat: True

# Model and rollout configuration
actor_rollout_ref:
  hybrid_engine: True

  model:
    use_remove_padding: True
    enable_gradient_checkpointing: True
    enable_activation_offload: True

  # Actor configuration
  actor:
    optim:
      lr: 3e-6  # DRPO 学习率
    ppo_mini_batch_size: 16  # 由命令行覆盖
    ppo_micro_batch_size_per_gpu: 2
    ppo_max_token_len_per_gpu: 8192  # prompt(2048) + response(2048) + buffer
    ppo_epochs: 1
    clip_ratio: 0.2  # PPO clip 范围
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    use_kl_loss: False  # 关闭 KL 约束（按需求）
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    ppo_kl_type: kl  # DRPO 内部 KL 类型
    ppo_kl_coef: 0.0  # 强制 zero KL penalty
    entropy_coeff: 0  # 关闭熵正则化
    fsdp_config:
      param_offload: True
      optimizer_offload: False
      model_dtype: bfloat16

    # DRPO 算法参数（参考 DRPO 论文）
    delta: 1e-4  # KL 散度约束边界阈值
    beta: 1e3  # 反向 KL 权重系数
    tau: 10  # 温度参数
    Lambda: 0.1  # 正向/反向 KL 混合系数

    # DRPO loss type
    policy_loss:
      loss_type: drpo  # DRPO 核心：vanilla / drpo

  # Rollout configuration
  rollout:
    name: vllm
    temperature: 1.0  # 训练时采样温度
    top_p: 1.0
    top_k: -1  # vLLM: -1 表示不限制
    prompt_length: 4096  # 最大 prompt 长度（包含多轮历史）
    response_length: 2048  # 单轮 assistant 生成上限

    # vLLM 特定参数
    gpu_memory_utilization: 0.85  # 2 卡 H200 显存充足
    tensor_model_parallel_size: 1
    max_model_len: 8192  # vLLM 最大序列长度
    max_num_batched_tokens: 16384  # vLLM 批处理最大 token 数
    max_num_seqs: 64  # vLLM 最大并发序列数
    enforce_eager: True
    free_cache_engine: True
    disable_log_stats: True

    n: 8  # 每个 prompt 采样 8 次（DRPO 需要 > 1）
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_max_token_len_per_gpu: 8192

    # Validation 采样参数
    val_kwargs:
      temperature: 1.0
      top_p: 1.0
      do_sample: false
      n: 1

    # Multi-turn with interaction
    multi_turn:
      enable: True
      max_user_turns: 25
      max_assistant_turns: 25
      interaction_config_path: null  # 通过命令行传入

    # Agent configuration
    agent:
      default_agent_loop: tool_agent
      num_workers: 2

  # Reference model configuration
  ref:
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_max_token_len_per_gpu: 6144
    fsdp_config:
      param_offload: True
      model_dtype: bfloat16

# Algorithm configuration
algorithm:
  adv_estimator: grpo  # DRPO 使用 GRPO 的 advantage estimator
  use_kl_in_reward: False

  # Prefix optimization
  optimize_prefix_tokens: False
  prefix_loss_weight: 1.0

# Trainer configuration
trainer:
  n_gpus_per_node: 2
  nnodes: 1
  device: cuda
  critic_warmup: 0
  logger: [console, wandb]
  project_name: textcraft_drpo
  experiment_name: qwen3-1.7b_textcraft_drpo
  entity: null
  total_epochs: 100
  save_freq: 500
  test_freq: 500
  default_local_dir: null  # 通过命令行 --trainer.default_local_dir 传入

# Critic disabled for DRPO
critic:
  enable: False

# Reward model disabled
reward_model:
  enable: False
