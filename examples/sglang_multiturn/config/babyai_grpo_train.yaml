hydra:
  searchpath:
    - file:///Data/wyh/verl/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# Data configuration
data:
  train_files: /Data/wyh/datasets/Verl-Data/train/babyai/train.parquet
  val_files: /Data/wyh/datasets/Verl-Data/eval/babyai/test.parquet
  max_prompt_length: 1024  # BabyAI任务描述相对较短
  max_response_length: 4096  # 整个episode所有轮次累积的response token总长度上限
  train_batch_size: 64
  val_batch_size: 4
  filter_overlong_prompts: True
  truncation: 'error'
  return_raw_chat: True

# Model and rollout configuration
actor_rollout_ref:
  hybrid_engine: True
  
  model:
    use_remove_padding: True
    enable_gradient_checkpointing: True
    enable_activation_offload: True
  
  # Actor configuration
  actor:
    optim:
      lr: 5e-6  # 学习率
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 2
    ppo_max_token_len_per_gpu: 8192  # prompt(1024) + response(4096) + buffer
    clip_ratio: 0.2  # PPO clip范围
    use_kl_loss: True
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0.03  # 熵奖励系数，增加探索
    fsdp_config:
      param_offload: True
      optimizer_offload: False
      model_dtype: bfloat16

  # Rollout configuration（参考AgentGym-RL配置）
  rollout:
    name: vllm  # 使用vLLM（更成熟稳定）
    temperature: 1.0  # 训练时的采样温度
    top_p: 1.0
    top_k: -1  # vLLM: -1表示不限制
    prompt_length: 4096  # 最大prompt长度（包含多轮历史）
    response_length: 4096  # 整个episode累积response长度上限
    
    # vLLM特定参数
    gpu_memory_utilization: 0.6  # vLLM内存占用
    tensor_model_parallel_size: 1
    max_model_len: 10240  # prompt_length + response_length的上限
    max_num_batched_tokens: 10240
    max_num_seqs: 256
    enforce_eager: True
    free_cache_engine: True
    disable_log_stats: True
    
    n: 8  # 每个prompt采样8次（GRPO需要）
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_max_token_len_per_gpu: 8192
    
    # Validation采样参数
    val_kwargs:
      temperature: 1.0
      top_p: 1.0
      do_sample: true
      n: 1
      max_tokens: 512  
    
    # Multi-turn with interaction
    multi_turn:
      enable: True
      max_user_turns: 50  # BabyAI可能需要更多轮次
      max_assistant_turns: 50
      interaction_config_path: /Data/wyh/verl/examples/sglang_multiturn/config/interaction_config/babyai_interaction.yaml
    
    # Agent configuration
    agent:
      default_agent_loop: tool_agent
      num_workers: 2  # worker数量

  # Reference model configuration
  ref:
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_max_token_len_per_gpu: 6144
    fsdp_config:
      param_offload: False
      model_dtype: bfloat16

# Algorithm configuration
algorithm:
  adv_estimator: grpo
  use_kl_in_reward: False

# Trainer configuration
trainer:
  n_gpus_per_node: 4
  nnodes: 1
  device: cuda
  critic_warmup: 0
  logger: [console, wandb]
  project_name: babyai_grpo
  experiment_name: qwen3-1.7b_babyai_grpo
  entity: null
  total_epochs: 50
  save_freq: 50
  test_freq: 10
  default_local_dir: /Data/wyh/datasets/Verl-Data/outputs/babyai_grpo

# Critic disabled for GRPO
critic:
  enable: False

# Reward model disabled
reward_model:
  enable: False

