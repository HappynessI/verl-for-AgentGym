# ============================================================
# TextCraft GRPO 训练配置 (Docker 容器内版本)
# 
# 说明：此配置文件用于 docker 容器内部
# 容器内路径映射：
#   - /workspace/verl   <-- VERL_CODE_DIR (宿主机路径在 .env 中配置)
#   - /workspace/datasets <-- DATASETS_DIR
#   - /workspace/models  <-- MODELS_DIR
#   - /workspace/outputs <-- OUTPUTS_DIR
# ============================================================

hydra:
  searchpath:
    - file:///workspace/verl/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# Data configuration
data:
  train_files: /workspace/datasets/Verl-Data/train/textcraft/train.parquet
  val_files: /workspace/datasets/Verl-Data/train/textcraft/train.parquet
  max_prompt_length: 2048
  max_response_length: 4096
  train_batch_size: 64
  val_batch_size: 4
  filter_overlong_prompts: True
  truncation: 'error'
  return_raw_chat: True

# Model and rollout configuration
actor_rollout_ref:
  hybrid_engine: True
  
  model:
    use_remove_padding: True
    enable_gradient_checkpointing: True
    enable_activation_offload: True
  
  # Actor configuration
  actor:
    optim:
      lr: 1e-6
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 2
    ppo_max_token_len_per_gpu: 12288
    clip_ratio: 0.2
    use_kl_loss: True
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    fsdp_config:
      param_offload: True
      optimizer_offload: False
      model_dtype: bfloat16

  # Rollout configuration
  rollout:
    name: vllm
    temperature: 0.7
    top_p: 0.9
    top_k: -1
    prompt_length: 4096
    response_length: 4096
    
    # vLLM specific parameters
    gpu_memory_utilization: 0.6
    tensor_model_parallel_size: 1
    max_model_len: 10240
    max_num_batched_tokens: 10240
    max_num_seqs: 256
    enforce_eager: True
    free_cache_engine: True
    disable_log_stats: True
    
    n: 4
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_max_token_len_per_gpu: 12288
    
    # Validation sampling parameters
    val_kwargs:
      temperature: 0.3
      top_p: 0.9
      do_sample: true
      n: 1
      max_tokens: 512  
    
    # Multi-turn with interaction (使用容器内路径)
    multi_turn:
      enable: True
      max_user_turns: 25  
      max_assistant_turns: 25
      interaction_config_path: /workspace/verl/examples/sglang_multiturn/config/interaction_config/textcraft_interaction.yaml
    
    # Agent configuration
    agent:
      default_agent_loop: tool_agent
      num_workers: 2

  # Reference model configuration
  ref:
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_max_token_len_per_gpu: 6144
    fsdp_config:
      param_offload: False
      model_dtype: bfloat16

# Algorithm configuration
algorithm:
  adv_estimator: grpo
  use_kl_in_reward: False

# Trainer configuration
trainer:
  n_gpus_per_node: 4
  nnodes: 1
  device: cuda
  critic_warmup: 0
  logger: [console, wandb]
  project_name: textcraft_grpo
  experiment_name: qwen3-1.7b_textcraft_grpo
  entity: null
  total_epochs: 10
  save_freq: 50
  test_freq: 5
  default_local_dir: /workspace/outputs/textcraft_grpo

# Critic disabled for GRPO
critic:
  enable: False

# Reward model disabled
reward_model:
  enable: False
