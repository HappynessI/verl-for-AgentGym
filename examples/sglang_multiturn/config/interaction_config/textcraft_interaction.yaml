# TextCraft Interaction Configuration
# TextCraft环境交互配置

interaction:
  - name: textcraft
    class_name: verl.interactions.textcraft_interaction.TextCraftInteraction
    config:
      # TextCraft环境服务器地址
      # 确保在训练前启动服务器：
      # cd AgentGym/agentenv-textcraft && textcraft --host 0.0.0.0 --port 36001
      env_server_base: "http://127.0.0.1:36001"
      
      # 请求超时（秒）
      timeout: 600
      
      # 最大重试次数
      max_retries: 3

