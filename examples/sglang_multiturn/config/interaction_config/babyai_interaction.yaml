# BabyAI Interaction Configuration
# BabyAI环境交互配置

interaction:
  - name: babyai
    class_name: verl.interactions.babyai_interaction.BabyAIInteraction
    config:
      # BabyAI环境服务器地址
      # 确保在训练前启动服务器：
      # cd AgentGym/agentenv-babyai && babyai --host 0.0.0.0 --port 36005
      env_server_base: "http://127.0.0.1:36005"
      
      # 请求超时（秒）
      timeout: 600
      
      # 最大重试次数
      max_retries: 3

