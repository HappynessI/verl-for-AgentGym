# SciWorld Interaction Configuration
# SciWorld环境交互配置（科学实验环境）

interaction:
  - name: sciworld
    class_name: verl.interactions.sciworld_interaction.SciWorldInteraction
    config:
      # SciWorld环境服务器地址
      # 确保在训练前启动服务器
      env_server_base: "http://127.0.0.1:36002"
      
      # 请求超时（秒）
      timeout: 600
      
      # 最大重试次数
      max_retries: 3

