# ============================================================
# DRPO Smoke Test Config for TextCraft
# ============================================================
# Smoke-test specific config for DRPO algorithm on TextCraft.
# Validates:
#   1. Multi-turn rollout with TextCraft environment interaction
#   2. DRPO loss computation (compute_policy_loss_drpo)
#   3. seq_level_rewards grouping by uid
#   4. KL constraint (delta/beta) and length-weighting (tau/Lambda)
#
# Uses lightweight settings: 1 GPU, batch=1, micro=1, response=128
# ============================================================

hydra:
  searchpath:
    - file:///Data/wyh/verl/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# ===========================
# Data: lightweight for smoke test
# ===========================
data:
  train_files: /Data/wyh/datasets/Verl-Data/train/textcraft/train.parquet
  val_files: /Data/wyh/datasets/Verl-Data/train/textcraft/train.parquet
  max_prompt_length: 2048
  max_response_length: 128       # very short for smoke test
  train_batch_size: 1
  val_batch_size: 1
  filter_overlong_prompts: true
  truncation: error
  return_raw_chat: true
  return_full_prompt: false
  return_raw_input_ids: false
  return_multi_modal_inputs: true

# ===========================
# Model and rollout: lightweight
# ===========================
actor_rollout_ref:
  hybrid_engine: True
  nccl_timeout: 600

  model:
    path: /Data/public/Qwen3-1.7B
    use_remove_padding: true
    use_fused_kernels: false
    enable_gradient_checkpointing: true
    enable_activation_offload: false

  # Actor: lightweight training
  actor:
    optim:
      lr: 1e-6
      weight_decay: 0.01
    ppo_mini_batch_size: 1
    ppo_micro_batch_size_per_gpu: 1
    ppo_epochs: 1
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    # DRPO uses KL loss for constraint penalty (kl_loss_coef * kl_loss)
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0.0
    calculate_entropy: false
    loss_agg_mode: token-mean
    # DRPO policy loss config — THIS IS THE KEY
    policy_loss:
      loss_type: drpo       # ← enables compute_policy_loss_drpo in dp_actor.py
      loss_mode: vanilla
      ppo_kl_coef: 0.1
    # DRPO-specific hyperparams (defined in actor.yaml defaults)
    delta: 1e-4              # KL constraint threshold
    beta: 1e3                # KL penalty coefficient
    tau: 10.0                # temperature for negative sampling
    Lambda: 0.1              # length-weighting parameter
    ppo_kl_type: kl          # KL type used in DRPO loss
    fsdp_config:
      param_offload: true
      optimizer_offload: true
      grad_offload: false
      model_dtype: bfloat16
      use_torch_compile: false

  # Rollout: lightweight
  rollout:
    name: vllm
    temperature: 0.7
    top_p: 0.9
    top_k: -1
    gpu_memory_utilization: 0.12      # low for smoke test
    tensor_model_parallel_size: 1
    max_model_len: 2048
    max_num_batched_tokens: 128
    max_num_seqs: 2
    enforce_eager: true
    free_cache_engine: true
    disable_log_stats: true
    n: 2                            # 2 rollouts per prompt for DRPO grouping
    log_prob_micro_batch_size_per_gpu: 1
    log_prob_max_token_len_per_gpu: 2048
    prompt_length: 2048
    response_length: 64

    # Validation kwargs
    val_kwargs:
      do_sample: false
      temperature: 1.0
      n: 1

    # Multi-turn: ENABLE with interaction_config_path
    multi_turn:
      enable: true
      max_user_turns: 25
      max_assistant_turns: 25
      interaction_config_path: /Data/wyh/verl/examples/sglang_multiturn/config/interaction_config/textcraft_interaction.yaml

    # Agent: single worker for smoke test
    agent:
      default_agent_loop: tool_agent
      num_workers: 1

  # Ref: KL loss requires ref model (kl_loss_coef > 0 + use_kl_loss: true)
  ref:
    log_prob_micro_batch_size_per_gpu: 1
    log_prob_max_token_len_per_gpu: 2048
    fsdp_config:
      param_offload: false
      dtype: bfloat16
      model_dtype: bfloat16

# ===========================
# Algorithm: GRPO advantage estimator with DRPO loss
# ===========================
algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: grpo          # GRPO groups by uid for advantage normalization
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false     # KL is handled via kl_loss, not in-reward penalty
  kl_penalty: kl
  kl_ctrl:
    kl_coef: 0.1

  # Prefix optimization DISABLED (train.parquet has no prefix tokens)
  optimize_prefix_tokens: false
  prefix_loss_weight: 1.0

# ===========================
# Trainer: minimal for smoke test
# ===========================
trainer:
  n_gpus_per_node: 1
  nnodes: 1
  device: cuda
  critic_warmup: 0
  logger: [console]            # smoke test: no wandb
  project_name: textcraft_drpo
  experiment_name: drpo_smoke_test
  total_epochs: 1              # 1 epoch is enough for smoke test
  total_training_steps: null
  save_freq: 999
  test_freq: -1                 # no validation during smoke test
  val_before_train: false       # skip pre-train validation for speed
  default_local_dir: /Data/wyh/datasets/Verl-Data/outputs/textcraft_drpo_smoke_test
  balance_batch: false

# ===========================
# Critic disabled for DRPO/GRPO
# ===========================
critic:
  enable: false

# ===========================
# Reward model disabled (rule-based RM used instead)
# ===========================
reward_model:
  enable: false
