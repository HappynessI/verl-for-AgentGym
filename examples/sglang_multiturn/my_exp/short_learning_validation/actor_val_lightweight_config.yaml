hydra:
  searchpath:
    - file:///Data/wyh/verl/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# ===========================
# Data: lightweight for actor validation
# ===========================
data:
  train_files: /Data/wyh/datasets/Verl-Data/outputs/textcraft_old_logits/active/textcraft_validated_prefix_history_canonicalized_with_prefix_old_logprobs_step200_v2.parquet
  val_files: /Data/wyh/datasets/Verl-Data/outputs/textcraft_old_logits/active/textcraft_validated_prefix_history_canonicalized_with_prefix_old_logprobs_step200_v2.parquet
  max_prompt_length: 2048
  max_response_length: 512
  train_batch_size: 2
  val_batch_size: 2
  filter_overlong_prompts: true
  truncation: error
  return_raw_chat: true
  return_full_prompt: false
  return_raw_input_ids: false
  return_multi_modal_inputs: true

# ===========================
# Model and rollout: lightweight
# ===========================
actor_rollout_ref:
  hybrid_engine: True
  nccl_timeout: 600

  model:
    path: /Data/public/Qwen3-1.7B
    use_remove_padding: true
    use_fused_kernels: false
    enable_gradient_checkpointing: true
    enable_activation_offload: false

  # Actor: lightweight training
  actor:
    optim:
      lr: 1e-6
      weight_decay: 0.01
    ppo_mini_batch_size: 2
    ppo_micro_batch_size_per_gpu: 1
    ppo_epochs: 1
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    use_kl_loss: false
    kl_loss_coef: 0.0
    kl_loss_type: low_var_kl
    entropy_coeff: 0.0
    calculate_entropy: false
    loss_agg_mode: token-mean
    policy_loss:
      loss_type: vanilla
      loss_mode: vanilla
      ppo_kl_coef: 0.1
    fsdp_config:
      param_offload: true
      optimizer_offload: true
      dtype: bfloat16
      model_dtype: bfloat16
      use_torch_compile: false

  # Rollout: lightweight — further reduced for GPU7 clean run
  rollout:
    name: vllm
    temperature: 0.0
    top_p: 1.0
    top_k: -1
    gpu_memory_utilization: 0.18
    tensor_model_parallel_size: 1
    max_model_len: 4096
    max_num_batched_tokens: 512
    max_num_seqs: 2
    enforce_eager: true
    enable_chunked_prefill: true
    cudagraph_capture_sizes: null
    free_cache_engine: true
    disable_log_stats: true
    n: 1
    log_prob_micro_batch_size_per_gpu: 1
    log_prob_max_token_len_per_gpu: 1536

    # Agent: single worker
    agent:
      default_agent_loop: tool_agent
      num_workers: 1

    # Multi-turn: ENABLE with interaction_config_path
    multi_turn:
      enable: true
      interaction_config_path: /Data/wyh/verl/examples/sglang_multiturn/config/interaction_config/textcraft_interaction.yaml

    # Validation kwargs
    val_kwargs:
      do_sample: false
      temperature: 1.0

  # Ref: keep config but ref model will be skipped at init (use_kl_loss=false)
  ref:
    log_prob_micro_batch_size_per_gpu: 1
    log_prob_max_token_len_per_gpu: 2048
    fsdp_config:
      param_offload: false
      dtype: bfloat16
      model_dtype: bfloat16

# ===========================
# Algorithm: prefix optimization enabled, KL off
# ===========================
algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: turn_full_trajectory
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false
  kl_penalty: kl
  kl_ctrl:
    kl_coef: 0.1
  optimize_prefix_tokens: true
  prefix_loss_weight: 1.0

# ===========================
# Trainer: minimal for validation
# ===========================
trainer:
  n_gpus_per_node: 1
  nnodes: 1
  device: cuda
  critic_warmup: 0
  logger: [console]
  project_name: actor_val
  experiment_name: actor_val_lightweight
  total_epochs: 1
  total_training_steps: 1
  save_freq: 999
  test_freq: -1
  val_before_train: false
  default_local_dir: /Data/wyh/datasets/Verl-Data/outputs/textcraft_grpo_actor_val_lightweight
  balance_batch: false

# ===========================
# Critic disabled for GRPO
# ===========================
critic:
  enable: false

# ===========================
# Reward model disabled
# ===========================
reward_model:
  enable: false
