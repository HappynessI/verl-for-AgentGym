hydra:
  searchpath:
    - file:///Data/wyh/verl/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# Data configuration
data:
  train_files: /Data/wyh/datasets/Verl-Data/outputs/textcraft_old_logits/active/textcraft_validated_prefix_history_canonicalized_with_prefix_old_logprobs_step200_v2.parquet
  val_files: /Data/wyh/datasets/Verl-Data/outputs/textcraft_old_logits/active/textcraft_validated_prefix_history_canonicalized_with_prefix_old_logprobs_step200_v2.parquet
  max_prompt_length: 2048
  max_response_length: 128   # same as smoke test
  train_batch_size: 1        # same as smoke test
  val_batch_size: 1
  filter_overlong_prompts: true
  truncation: error
  return_raw_chat: true
  return_full_prompt: false
  return_raw_input_ids: false
  return_multi_modal_inputs: true

# Model and rollout configuration
actor_rollout_ref:
  hybrid_engine: True

  model:
    path: /Data/public/Qwen3-1.7B
    use_remove_padding: true
    use_fused_kernels: false
    enable_gradient_checkpointing: true
    enable_activation_offload: false

  # Actor configuration
  actor:
    optim:
      lr: 5e-6          # ↑ from 1e-6: stronger gradient signal
      weight_decay: 0.01
    ppo_mini_batch_size: 1    # keep 1 for consistency
    ppo_micro_batch_size_per_gpu: 1
    ppo_epochs: 1
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    use_kl_loss: false
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    calculate_entropy: false
    loss_agg_mode: token-mean
    policy_loss:
      loss_type: vanilla
      loss_mode: vanilla
      ppo_kl_coef: 0.1
    fsdp_config:
      param_offload: true
      optimizer_offload: true
      dtype: bfloat16
      use_torch_compile: false

  # Rollout configuration
  rollout:
    name: vllm
    temperature: 0.7
    top_p: 0.9
    top_k: -1
    gpu_memory_utilization: 0.30
    tensor_model_parallel_size: 1
    max_model_len: 4096
    max_num_batched_tokens: 512   # ↑ from 256: allow more tokens for multi-turn
    max_num_seqs: 8              # ↑ from 4: allow more sequences
    enforce_eager: true
    free_cache_engine: true
    disable_log_stats: true
    n: 1                         # keep at 1 to avoid prefix expansion bug with variable prefix_token_count
    log_prob_micro_batch_size_per_gpu: 1
    log_prob_max_token_len_per_gpu: 2048

    # Multi-turn with interaction
    multi_turn:
      enable: true
      max_user_turns: 30          # ↑ from 25: more turns to complete task
      max_assistant_turns: 30     # ↑ from 25: more assistant turns
      interaction_config_path: /Data/wyh/verl/examples/sglang_multiturn/config/interaction_config/textcraft_interaction.yaml

    # Agent configuration
    agent:
      default_agent_loop: tool_agent
      num_workers: 1

  # Reference model configuration
  ref:
    log_prob_micro_batch_size_per_gpu: 1
    log_prob_max_token_len_per_gpu: 2048
    fsdp_config:
      param_offload: false
      dtype: bfloat16

# Algorithm configuration
algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false
  kl_penalty: kl
  kl_ctrl:
    kl_coef: 0.1

  # Prefix optimization: keep enabled
  optimize_prefix_tokens: true
  prefix_loss_weight: 1.0

# Trainer configuration
trainer:
  n_gpus_per_node: 1
  nnodes: 1
  device: cuda
  critic_warmup: 0
  logger: [console]
  project_name: textcraft_prefix
  experiment_name: short_learning_val
  total_epochs: 3               # ↑ from 1: run 3 epochs for more learning signal
  save_freq: 999
  test_freq: 999
  val_before_train: false
  default_local_dir: /Data/wyh/datasets/Verl-Data/outputs/textcraft_grpo_prefix_smoke_test_canonicalized
  balance_batch: false

# Critic disabled for GRPO
critic:
  enable: false

# Reward model disabled
reward_model:
  enable: false
