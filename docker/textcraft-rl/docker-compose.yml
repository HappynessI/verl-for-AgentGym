# ============================================================
# TextCraft RL 多服务编排
# 包含：
#   1. textcraft-server  —— TextCraft 游戏环境服务器（无 GPU，轻量）
#   2. textcraft-rl      —— verl + vLLM RL 训练容器（需要 GPU）
#
# 使用方法：
#   cp .env.example .env          # 按实际路径修改 .env
#   docker-compose up -d          # 启动两个服务
#   docker exec -it textcraft-rl bash
#   bash /workspace/verl/docker/textcraft-rl/run_training.sh
#
# 快速启动（传入 GPU 索引）：
#   CUDA_VISIBLE_DEVICES=0,1 docker-compose up -d
# ============================================================

version: '3.8'

# ── 公共配置复用 ────────────────────────────────────────────
x-common-volumes: &common-volumes
  - ${VERL_CODE_DIR:?请在 .env 或环境变量中设置 VERL_CODE_DIR}:/workspace/verl:rw
  - ${DATASETS_DIR:?请在 .env 或环境变量中设置 DATASETS_DIR}:/workspace/datasets:rw
  - ${MODELS_DIR:?请在 .env 或环境变量中设置 MODELS_DIR}:/workspace/models:ro
  - ${OUTPUTS_DIR:?请在 .env 或环境变量中设置 OUTPUTS_DIR}:/workspace/outputs:rw
  - ${HF_CACHE_DIR:-/tmp/hf-cache}:/workspace/cache/huggingface:rw

services:
  # ── 1. TextCraft 环境服务器（无 GPU）──────────────────────
  textcraft-server:
    container_name: textcraft-server
    build:
      context: .
      dockerfile: Dockerfile.textcraft-server
    image: textcraft-server:latest
    restart: unless-stopped

    # 只暴露游戏服务器端口，不用 host 网络（安全隔离）
    ports:
      - "${TEXTCRAFT_PORT:-36001}:36001"

    environment:
      - TEXTCRAFT_HOST=0.0.0.0
      - TEXTCRAFT_PORT=36001
      - PYTHONUNBUFFERED=1

    # 健康状态让训练容器等待
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:36001/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    # 仅挂载 verl 代码（entrypoint 会安装 agentenv-textcraft）
    volumes:
      - ${VERL_CODE_DIR:?}:/workspace/verl:ro

  # ── 2. RL 训练容器（需要 GPU）────────────────────────────
  textcraft-rl:
    container_name: textcraft-rl
    build:
      context: .
      dockerfile: Dockerfile
    image: textcraft-rl:latest
    restart: unless-stopped

    # 等待游戏服务器就绪后再启动
    depends_on:
      textcraft-server:
        condition: service_healthy

    # GPU 配置
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # 使用 host 网络以便和 textcraft-server 通信（host 模式时 ports 失效）
    # 若 textcraft-server 也改为 host 模式，需要确保端口不冲突
    network_mode: host
    ipc: host
    shm_size: '64gb'

    environment:
      - NVIDIA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-all}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/workspace/cache/huggingface
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - WANDB_DIR=/workspace/outputs/wandb
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_DEBUG=${NCCL_DEBUG:-WARN}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      # TextCraft 服务器地址（host 网络下直接用 localhost）
      - TEXTCRAFT_SERVER_URL=${TEXTCRAFT_SERVER_URL:-http://127.0.0.1:36001}
      # 训练参数（可在 .env 中覆盖）
      - EXPERIMENT=${EXPERIMENT:-grpo_baseline}
      - MODEL_NAME=${MODEL_NAME:-Qwen3-1.7B}
      - NUM_EPOCHS=${NUM_EPOCHS:-100}
      - TRAIN_BATCH_SIZE=${TRAIN_BATCH_SIZE:-128}
      - MICRO_BATCH_SIZE=${MICRO_BATCH_SIZE:-2}
      - PPO_MAX_TOKEN_LEN=${PPO_MAX_TOKEN_LEN:-36864}
      - LEARNING_RATE=${LEARNING_RATE:-5e-6}
      - ROLLOUT_N=${ROLLOUT_N:-8}
      - ADV_ESTIMATOR=${ADV_ESTIMATOR:-grpo}
      # DRPO 特有参数
      - DELTA=${DELTA:-1e-4}
      - BETA=${BETA:-1e3}
      - TAU=${TAU:-10}
      - LAMBDA=${LAMBDA:-0.1}

    volumes: *common-volumes

    working_dir: /workspace/verl
    stdin_open: true
    tty: true
